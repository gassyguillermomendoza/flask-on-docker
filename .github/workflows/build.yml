name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Test web server
        run: |
          sleep 5
          curl --fail http://localhost:4239
