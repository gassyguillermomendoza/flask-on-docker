name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Check web service
        run: curl --fail http://localhost:4239
